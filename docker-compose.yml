services:
  postgres:
    image: postgres:16-alpine
    container_name: bogugot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bogugot
      POSTGRES_PASSWORD: bogugot1234
      POSTGRES_DB: bogugot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: bogugot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
